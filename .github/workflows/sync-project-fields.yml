name: Sync Project Fields

on:
  issues:
    types: [opened, labeled]

permissions:
  contents: read
  issues: write
  repository-projects: write

jobs:
  sync-fields:
    runs-on: ubuntu-latest

    steps:
      - name: Sync labels в†’ project fields
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}

          # -------------------------
          # PROJECT
          # -------------------------
          PROJECT_ID: ${{ vars.PROJECT_ID }}

          # -------------------------
          # FIELDS
          # -------------------------
          FIELD_10WEB: ${{ vars.FIELD_10WEB }}
          FIELD_CONTEUDO: ${{ vars.FIELD_CONTEUDO }}
          FIELD_TRANSACAO: ${{ vars.FIELD_TRANSACAO }}

          # -------------------------
          # OPTIONS (10 WEB)
          # -------------------------
          OPT_10WEB_1: ${{ vars.OPT_10WEB_1 }}
          OPT_10WEB_2: ${{ vars.OPT_10WEB_2 }}
          OPT_10WEB_3: ${{ vars.OPT_10WEB_3 }}
          OPT_10WEB_4: ${{ vars.OPT_10WEB_4 }}
          OPT_10WEB_5: ${{ vars.OPT_10WEB_5 }}
          OPT_10WEB_6: ${{ vars.OPT_10WEB_6 }}
          OPT_10WEB_7: ${{ vars.OPT_10WEB_7 }}
          OPT_10WEB_8: ${{ vars.OPT_10WEB_8 }}
          OPT_10WEB_9: ${{ vars.OPT_10WEB_9 }}
          OPT_10WEB_10: ${{ vars.OPT_10WEB_10 }}

          # -------------------------
          # OPTIONS (CONTEГљDO)
          # -------------------------
          OPT_CONT_1: ${{ vars.OPT_CONT_1 }}
          OPT_CONT_2: ${{ vars.OPT_CONT_2 }}
          OPT_CONT_3: ${{ vars.OPT_CONT_3 }}
          OPT_CONT_4: ${{ vars.OPT_CONT_4 }}
          OPT_CONT_5: ${{ vars.OPT_CONT_5 }}

          # -------------------------
          # OPTIONS (TRANSAГ‡ГѓO)
          # -------------------------
          OPT_TRANS_1: ${{ vars.OPT_TRANS_1 }}
          OPT_TRANS_2: ${{ vars.OPT_TRANS_2 }}
          OPT_TRANS_3: ${{ vars.OPT_TRANS_3 }}
          OPT_TRANS_4: ${{ vars.OPT_TRANS_4 }}

        run: |
          echo "рџ”Ќ A ler labels..."

          LABELS=$(jq -r '.issue.labels[].name' "$GITHUB_EVENT_PATH")
          ISSUE_NODE_ID=$(jq -r '.issue.node_id' "$GITHUB_EVENT_PATH")

          echo "$LABELS"

          FIELD_ID=""
          OPTION_ID=""

          # -------------------------
          # DETETAR FIELD
          # -------------------------
          if echo "$LABELS" | grep -q "chk 10 web"; then
            FIELD_ID=$FIELD_10WEB
            PREFIX="OPT_10WEB_"
          fi

          if echo "$LABELS" | grep -q "chk conteudo"; then
            FIELD_ID=$FIELD_CONTEUDO
            PREFIX="OPT_CONT_"
          fi

          if echo "$LABELS" | grep -q "chk transacao"; then
            FIELD_ID=$FIELD_TRANSACAO
            PREFIX="OPT_TRANS_"
          fi

          echo "рџ“Њ FIELD_ID: $FIELD_ID"

          # -------------------------
          # EXTRAIR R
          # -------------------------
          R_NUMBER=$(echo "$LABELS" | grep -oE 'R [0-9]+' | head -n1 | cut -d' ' -f2)

          echo "рџ”ў R_NUMBER: $R_NUMBER"

          if [ -z "$R_NUMBER" ]; then
            echo "вљ пёЏ Sem label R вЂ” abortar"
            exit 0
          fi

          VAR_NAME="${PREFIX}${R_NUMBER}"
          OPTION_ID=$(printenv $VAR_NAME)

          echo "рџЋЇ OPTION_ID: $OPTION_ID"

          if [ -z "$FIELD_ID" ] || [ -z "$OPTION_ID" ]; then
            echo "вљ пёЏ Mapping incompleto вЂ” abortar"
            exit 0
          fi

          # -------------------------
          # ADICIONAR AO PROJECT
          # -------------------------
          echo "вћ• Adicionar ao project..."

          ITEM_ID=$(gh api graphql -f query='
            mutation($project:ID!, $content:ID!) {
              addProjectV2ItemById(input:{
                projectId:$project,
                contentId:$content
              }) {
                item { id }
              }
            }' \
            -f project=$PROJECT_ID \
            -f content=$ISSUE_NODE_ID \
            --jq '.data.addProjectV2ItemById.item.id')

          echo "рџ§© ITEM_ID: $ITEM_ID"

          # -------------------------
          # UPDATE FIELD
          # -------------------------
          echo "вњЏпёЏ Atualizar field..."

          gh api graphql -f query='
            mutation($project:ID!, $item:ID!, $field:ID!, $option: String!) {
              updateProjectV2ItemFieldValue(input:{
                projectId:$project,
                itemId:$item,
                fieldId:$field,
                value:{ singleSelectOptionId:$option }
              }) { clientMutationId }
            }' \
            -f project=$PROJECT_ID \
            -f item=$ITEM_ID \
            -f field=$FIELD_ID \
            -f option=$OPTION_ID

          echo "вњ… Done"
