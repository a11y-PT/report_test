name: Sync Project Fields

on:
  issues:
    types: [opened, labeled]

permissions:
  contents: read
  issues: write
  repository-projects: write

jobs:
  sync-fields:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Sync labels → project fields
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          PROJECT_ID: ${{ vars.PROJECT_ID }} # único valor que mantemos
        run: |
          echo "🔍 A ler labels..."

          LABELS=$(jq -r '.issue.labels[].name' "$GITHUB_EVENT_PATH")
          ISSUE_NODE_ID=$(jq -r '.issue.node_id' "$GITHUB_EVENT_PATH")

          echo "$LABELS"

          # -------------------------
          # DETETAR CHECKLIST
          # -------------------------
          CHECK_KEY=$(echo "$LABELS" | grep -Eo 'chk [^ ]+( [^ ]+)?' | head -n1)

          echo "📌 CHECK_KEY: $CHECK_KEY"

          if [ -z "$CHECK_KEY" ]; then
            echo "⚠️ Sem checklist — abortar"
            exit 0
          fi

          # -------------------------
          # EXTRAIR R
          # -------------------------
          R_NUMBER=$(echo "$LABELS" | grep -oE 'R [0-9]+' | head -n1 | cut -d' ' -f2)

          echo "🔢 R_NUMBER: $R_NUMBER"

          if [ -z "$R_NUMBER" ]; then
            echo "⚠️ Sem label R — abortar"
            exit 0
          fi

          # -------------------------
          # LER MAPPING
          # -------------------------
          FIELD_NAME=$(jq -r --arg key "$CHECK_KEY" '.[$key].field' .config/mapping.json)

          OPTION_NAME=$(jq -r --arg key "$CHECK_KEY" --arg num "$R_NUMBER" \
            '.[$key].options[$num]' .config/mapping.json)

          echo "📌 FIELD_NAME: $FIELD_NAME"
          echo "🎯 OPTION_NAME: $OPTION_NAME"

          if [ "$FIELD_NAME" == "null" ] || [ "$OPTION_NAME" == "null" ]; then
            echo "⚠️ Mapping não encontrado — abortar"
            exit 0
          fi

          # -------------------------
          # OBTER FIELDS DO PROJECT
          # -------------------------
          echo "📡 Obter fields do project..."

          FIELDS_JSON=$(gh api graphql -f query='
          query($project: ID!) {
            node(id: $project) {
              ... on ProjectV2 {
                fields(first: 50) {
                  nodes {
                    ... on ProjectV2SingleSelectField {
                      id
                      name
                      options {
                        id
                        name
                      }
                    }
                  }
                }
              }
            }
          }' -f project=$PROJECT_ID)

          # -------------------------
          # RESOLVER FIELD_ID
          # -------------------------
          FIELD_ID=$(echo "$FIELDS_JSON" | jq -r --arg name "$FIELD_NAME" '
            .data.node.fields.nodes[]
            | select(.name == $name)
            | .id
          ')

          # -------------------------
          # RESOLVER OPTION_ID
          # -------------------------
          OPTION_ID=$(echo "$FIELDS_JSON" | jq -r \
            --arg fname "$FIELD_NAME" \
            --arg oname "$OPTION_NAME" '
            .data.node.fields.nodes[]
            | select(.name == $fname)
            | .options[]
            | select(.name == $oname)
            | .id
          ')

          echo "🧩 FIELD_ID: $FIELD_ID"
          echo "🎯 OPTION_ID: $OPTION_ID"

          if [ -z "$FIELD_ID" ] || [ -z "$OPTION_ID" ]; then
            echo "❌ Não foi possível resolver IDs"
            exit 1
          fi

          # -------------------------
          # ADICIONAR AO PROJECT
          # -------------------------
          ITEM_ID=$(gh api graphql -f query='
            mutation($project:ID!, $content:ID!) {
              addProjectV2ItemById(input:{
                projectId:$project,
                contentId:$content
              }) {
                item { id }
              }
            }' \
            -f project=$PROJECT_ID \
            -f content=$ISSUE_NODE_ID \
            --jq '.data.addProjectV2ItemById.item.id')

          echo "📦 ITEM_ID: $ITEM_ID"

          # -------------------------
          # ATUALIZAR FIELD
          # -------------------------
          gh api graphql -f query='
            mutation($project:ID!, $item:ID!, $field:ID!, $option: String!) {
              updateProjectV2ItemFieldValue(input:{
                projectId:$project,
                itemId:$item,
                fieldId:$field,
                value:{ singleSelectOptionId:$option }
              }) { clientMutationId }
            }' \
            -f project=$PROJECT_ID \
            -f item=$ITEM_ID \
            -f field=$FIELD_ID \
            -f option=$OPTION_ID

          echo "✅ Done"
